apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-api
  namespace: release-api-dev
  labels:
    app.kubernetes.io/name: release-api
    app.kubernetes.io/instance: release-api-dev
    app.kubernetes.io/version: v0.1.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: release-api
      app.kubernetes.io/instance: release-api-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: release-api
        app.kubernetes.io/instance: release-api-dev
        app.kubernetes.io/version: v0.1.0
    spec:
      containers:
        - name: release-api
          image: ghcr.io/fahriddin989/ci-cd-release-engineering-foundation:v0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: release-api-config
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
